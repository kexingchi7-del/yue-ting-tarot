<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个可离线使用的塔罗牌占卜小程序，支持单张、三张与四象十字牌阵。"
    />
    <title>月庭塔罗 · 占卜</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23120e0a'/%3E%3Cpath d='M32 10l5 17 17 5-17 5-5 17-5-17-17-5 17-5z' fill='%23c9a96e'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23c43a3a' opacity='0.7'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="starfield" aria-hidden="true">
      <div class="starfield__layer starfield__layer--slow"></div>
      <div class="starfield__layer starfield__layer--med"></div>
    </div>
    <main class="app-shell">
      <section class="oracle">
        <div class="brand">
          <span>月庭塔罗</span>
          <strong>Tarot Oracle</strong>
        </div>

        <form class="reading-form" data-reading-form>
          <label>
            <span>问题</span>
            <input data-question maxlength="80" placeholder="例如：这段关系下一步该怎么看？" />
          </label>

          <label>
            <span>主题</span>
            <select data-focus>
              <option>综合</option>
              <option>感情</option>
              <option>事业</option>
              <option>金钱</option>
              <option>自我成长</option>
            </select>
          </label>

          <label>
            <span>星座 <em>可选</em></span>
            <select data-zodiac aria-label="选择你的星座"></select>
          </label>

          <div class="date-fields">
            <label>
              <span>出生日期 <em>自动推算星座</em></span>
              <input type="date" data-birth-date />
            </label>
            <label>
              <span>查看日期 <em>用于择日参考</em></span>
              <input type="date" data-target-date />
            </label>
          </div>

          <div class="birth-details">
            <label>
              <span>出生时刻 <em>用于时辰判定</em></span>
              <input type="time" data-birth-time />
            </label>
            <label>
              <span>出生地 <em>用于经度校正</em></span>
              <select data-birth-city aria-label="选择出生地"></select>
            </label>
          </div>

          <div class="spread-picker" aria-label="牌阵">
            <button type="button" data-spread="single">
              <div class="spread-dots" aria-hidden="true"><i></i></div>
              <span></span><small></small>
            </button>
            <button type="button" data-spread="three">
              <div class="spread-dots" aria-hidden="true"><i></i><i></i><i></i></div>
              <span></span><small></small>
            </button>
            <button type="button" data-spread="cross">
              <div class="spread-dots spread-dots--cross" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
              <span></span><small></small>
            </button>
          </div>

          <div class="draw-mode" aria-label="抽牌方式">
            <button type="button" class="is-active" data-draw-mode="auto" aria-pressed="true">自动抽牌</button>
            <button type="button" data-draw-mode="manual" aria-pressed="false">自选牌</button>
          </div>

          <div class="action-row">
            <button class="draw-button" type="submit" data-draw>开始占卜</button>
            <button class="quick-button" type="button" data-daily>今日牌</button>
          </div>
        </form>
      </section>

      <section class="manual-picker" data-manual-picker hidden>
        <div class="section-head">
          <div>
            <h2>从洗好的牌堆中选牌</h2>
            <p data-selection-status></p>
          </div>
          <button type="button" data-reshuffle>重新洗牌</button>
        </div>
        <div class="selection-filter" data-selection-filter></div>
        <div class="selection-deck" data-selection-deck></div>
      </section>

      <section class="reading-panel" data-reading hidden>
        <div class="section-head">
          <h1>牌面解读</h1>
          <div class="section-actions">
            <button type="button" data-share>复制解读</button>
            <button type="button" data-save-image>保存图片</button>
          </div>
        </div>
        <div class="card-grid" data-cards></div>
        <div class="summary" data-summary></div>
        <button class="draw-button draw-button--block" type="button" data-redraw>再抽一次</button>
      </section>

      <aside class="history-panel history-panel--collapsed">
        <div class="section-head">
          <h2>最近记录</h2>
          <div class="section-actions">
            <button type="button" data-toggle-history aria-expanded="false" aria-controls="reading-history-list">展开</button>
            <button type="button" data-clear>清空</button>
          </div>
        </div>
        <div class="history-list" id="reading-history-list" data-history></div>
      </aside>
    </main>

    <div class="ritual" data-ritual hidden>
      <div class="ritual__inner">
        <div class="ritual__cards" data-ritual-cards></div>
        <span>请在心里默念问题</span>
        <strong>正在连接你的能量...</strong>
        <div class="ritual__particles" data-ritual-particles></div>
      </div>
    </div>
    <div class="toast" data-toast hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
